spring:
  application:
    name: calories-app
  mvc:
    format:
      date: yyyy-MM-dd
      date-time: yyyy-MM-dd HH:mm:ss
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:6541/calories
    username: user
    password: user
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: true
      hibernate:
        default_schema: entities
    show-sql: true
    open-in-view: false
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml